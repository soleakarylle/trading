<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vndyne's Trading List</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Vndyne's Trading List</h1>
<p class="tagline">Broadway • West End • Touring Archive</p>

<div class="stats">
<span id="totalCollection"></span>
<span id="totalWants"></span>
<span id="lastUpdated"></span>
</div>

</header>

<section class="intro">
<p>
Welcome to my personal trading archive.  
All recordings listed are for trading purposes only.
</p>

<button onclick="loadCollection()">Collection</button>
<button onclick="loadWants()">Wants</button>
<button onclick="importEncora()">Import Encora</button>
</section>

<section class="controls">

<input id="search" placeholder="Search show, cast, theatre...">

<select id="formatFilter">
<option value="">All Formats</option>
<option value="video">Video</option>
<option value="audio">Audio</option>
<option value="proshot">Proshot</option>
</select>

</section>

<section id="list"></section>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
